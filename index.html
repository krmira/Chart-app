<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Office Dashboard</title>
  <link rel="stylesheet" href="style.css">
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>

  <h1>Office Dashboard</h1>

  <!-- Summary Cards -->
  <div class="cards">
    <div class="card">Revenue: $18,500</div>
    <div class="card">Employees: 12</div>
    <div class="card">Tasks Done: 320</div>
    <div class="card">Growth: +12%</div>
  </div>

  <!-- Charts -->
  <div class="charts">
    <canvas id="revenueChart"></canvas>
    <canvas id="salesChart"></canvas>
  </div>

  <!-- Table -->
  <table>
    <tr>
      <th>Name</th>
      <th>Department</th>
      <th>Tasks</th>
    </tr>
    <tr>
      <td>John</td>
      <td>Sales</td>
      <td>45</td>
    </tr>
    <tr>
      <td>Sarah</td>
      <td>Marketing</td>
      <td>38</td>
    </tr>
  </table>

  <script src="script.js"></script>
</body>
</html>
